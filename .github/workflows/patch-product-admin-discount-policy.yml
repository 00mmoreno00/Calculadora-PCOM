name: Patch product admin discount policy

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch Calculadora admin
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('Calculadora.dc.html')
          text = path.read_text(encoding='utf-8')

          def replace_once(src, old, new, label):
              if old not in src:
                  raise SystemExit(f'No se encontró el bloque para: {label}')
              return src.replace(old, new, 1)

          # 1) Helpers para discountPolicy por zona.
          old = '''  saveProductOverrides(obj) {
    try { localStorage.setItem(this.PRODUCT_LS, JSON.stringify(obj)); } catch (e) { }
    this.forceUpdate();
  }
  // Configuración efectiva de un producto (default + override). Soporta productos personalizados.'''
          new = '''  saveProductOverrides(obj) {
    try { localStorage.setItem(this.PRODUCT_LS, JSON.stringify(obj)); } catch (e) { }
    this.forceUpdate();
  }

  defaultDiscountPolicy(fallbackCap) {
    const zones = (window.PC.config.zones || []).map(z => z.id);
    const byZone = {};
    zones.forEach(zoneId => {
      byZone[zoneId] = {
        discountCapPct: zoneId === "FULLPRICE" ? 0 : (Number(fallbackCap) || 0),
        active: false
      };
    });
    return { mode: "byZone", sameCapForAllZones: false, byZone };
  }

  normalizeDiscountPolicy(policy, fallbackCap) {
    const base = this.defaultDiscountPolicy(fallbackCap);
    const p = policy && typeof policy === "object" ? policy : {};
    const rawZones = p.byZone || p.zones || {};
    Object.keys(base.byZone).forEach(zoneId => {
      const z = rawZones[zoneId] || {};
      base.byZone[zoneId] = {
        discountCapPct: z.discountCapPct != null ? Number(z.discountCapPct) : (z.capPct != null ? Number(z.capPct) : base.byZone[zoneId].discountCapPct),
        active: z.active === true
      };
    });
    base.sameCapForAllZones = p.sameCapForAllZones === true;
    return base;
  }

  hasZoneDiscountPolicy(policy) {
    const p = this.normalizeDiscountPolicy(policy, 0);
    return Object.keys(p.byZone).some(zoneId => p.byZone[zoneId] && p.byZone[zoneId].active === true);
  }

  // Configuración efectiva de un producto (default + override). Soporta productos personalizados.'''
          text = replace_once(text, old, new, 'insertar helpers discountPolicy')

          # 2) pcfg: agregar discountPolicy y dejar estados sin restricciones invisibles.
          old = '''    const ov = (this.getProductOverrides()[id]) || {};
    const states = Array.isArray(ov.states) ? ov.states : (ov.restrictState ? [ov.restrictState] : []);
    return {'''
          new = '''    const ov = (this.getProductOverrides()[id]) || {};
    const maxDiscount = ov.maxDiscount != null && ov.maxDiscount !== "" ? Number(ov.maxDiscount) : 100;
    const discountPolicy = this.normalizeDiscountPolicy(ov.discountPolicy, maxDiscount);
    return {'''
          text = replace_once(text, old, new, 'pcfg maxDiscount/discountPolicy')

          old = '''      maxDiscount: ov.maxDiscount != null && ov.maxDiscount !== "" ? Number(ov.maxDiscount) : 100,
      basePrice: ov.basePrice != null && ov.basePrice !== "" ? Number(ov.basePrice) : null,'''
          new = '''      maxDiscount: maxDiscount,
      discountPolicy: discountPolicy,
      basePrice: ov.basePrice != null && ov.basePrice !== "" ? Number(ov.basePrice) : null,'''
          text = replace_once(text, old, new, 'pcfg property discountPolicy')

          old = '''      states: states,'''
          new = '''      states: [],'''
          text = replace_once(text, old, new, 'pcfg eliminar estados efectivos')

          # 3) Pasar discountPolicy al cfg de cálculo para siguientes ajustes del motor.
          old = '''        basePriceOverride: baseOverride, maxDiscount: pc.maxDiscount'''
          new = '''        basePriceOverride: baseOverride, maxDiscount: pc.maxDiscount, discountPolicy: pc.discountPolicy'''
          text = replace_once(text, old, new, 'cfg discountPolicy')

          # 4) Eliminar validación invisible por estados de producto.
          old = '''      // Restricción por estado(s) (admin): el producto solo aplica en los estados listados.
      if (pc.states.length && pc.states.indexOf(s.stateName) < 0) {
        validation.complete = false;
        validation.missing.push(pc.name + " solo aplica en: " + pc.states.join(", ") + " (estado actual: " + (s.stateName || "sin estado") + ")");
      }
'''
          new = '''      // Los productos ya no se restringen por estado desde el admin.
      // La zona de pricing gobierna precio y descuento.
'''
          text = replace_once(text, old, new, 'quitar restricción por estado')

          # 5) Edit form: variables para deshabilitar tope global cuando hay zonas activas.
          old = '''      const pc = this.pcfg(id), t = this.themes[pc.theme] || this.themes.green;
      const isTable = (id === "elite" || id === "oportunidades");'''
          new = '''      const pc = this.pcfg(id), t = this.themes[pc.theme] || this.themes.green;
      const isTable = (id === "elite" || id === "oportunidades");
      const hasZoneDiscount = this.hasZoneDiscountPolicy(pc.discountPolicy);
      const maxDiscountStyle = Object.assign({}, inp, hasZoneDiscount ? { background: "#F3F4F6", color: "#8A8A93", cursor: "not-allowed" } : {});'''
          text = replace_once(text, old, new, 'editForm helpers')

          # 6) Top field: deshabilitar tope global si existe policy por zona.
          old = '''          h("div", null, h("label", { style: lbl }, "Tope descuento %"), h("input", { type: "number", min: "0", max: "100", style: inp, value: pc.maxDiscount, onChange: e => patch(id, "maxDiscount", e.target.value) })),'''
          new = '''          h("div", null,
            h("label", { style: lbl }, "Tope descuento %"),
            h("input", { type: "number", min: "0", max: "100", disabled: hasZoneDiscount, style: maxDiscountStyle, value: pc.maxDiscount, onChange: e => patch(id, "maxDiscount", e.target.value) }),
            hasZoneDiscount ? h("div", { style: { marginTop: "5px", font: "600 10.5px/1.35 Nunito", color: "#6B6B73", display: "flex", gap: "5px", alignItems: "center" } }, "ⓘ", "Se habilita solo si no hay zonas configuradas.") : null),'''
          text = replace_once(text, old, new, 'campo tope global')

          # 7) Método renderDiscountPolicyEditor antes de renderProductAdmin.
          marker = '''  renderProductAdmin() {'''
          method = '''  renderDiscountPolicyEditor(id, pc, patch, inp, lbl) {
    const h = React.createElement, C = window.PC.config;
    const policy = this.normalizeDiscountPolicy(pc.discountPolicy, pc.maxDiscount);
    const zoneIds = (C.zones || []).map(z => z.id);
    const zoneLabel = (zoneId) => {
      const z = (C.zones || []).find(x => x.id === zoneId);
      return z ? z.label.replace(" (lista nacional)", "") : zoneId;
    };
    const clonePolicy = () => JSON.parse(JSON.stringify(policy));
    const savePolicy = (next) => patch(id, "discountPolicy", next);
    const enableZones = () => {
      const next = clonePolicy();
      Object.keys(next.byZone).forEach(zoneId => {
        next.byZone[zoneId].active = true;
        if (next.byZone[zoneId].discountCapPct == null || next.byZone[zoneId].discountCapPct === "") {
          next.byZone[zoneId].discountCapPct = zoneId === "FULLPRICE" ? 0 : (Number(pc.maxDiscount) || 0);
        }
      });
      savePolicy(next);
    };
    const updateSame = (checked) => {
      const next = clonePolicy();
      next.sameCapForAllZones = checked;
      if (checked) {
        const activeZone = Object.keys(next.byZone).find(zoneId => next.byZone[zoneId].active);
        const cap = activeZone ? next.byZone[activeZone].discountCapPct : (Number(pc.maxDiscount) || 0);
        Object.keys(next.byZone).forEach(zoneId => {
          next.byZone[zoneId].active = true;
          next.byZone[zoneId].discountCapPct = zoneId === "FULLPRICE" ? 0 : cap;
        });
      }
      savePolicy(next);
    };
    const updateZone = (zoneId, key, val) => {
      const next = clonePolicy();
      next.byZone[zoneId] = Object.assign({}, next.byZone[zoneId], {
        [key]: key === "active" ? !!val : window.PC.utils.clamp(Number(val) || 0, 0, 100)
      });
      if (key === "discountCapPct" && policy.sameCapForAllZones && zoneId !== "FULLPRICE") {
        Object.keys(next.byZone).forEach(zid => {
          if (zid !== "FULLPRICE") next.byZone[zid].discountCapPct = window.PC.utils.clamp(Number(val) || 0, 0, 100);
        });
      }
      savePolicy(next);
    };

    const row = (zoneId) => {
      const z = policy.byZone[zoneId] || { discountCapPct: 0, active: false };
      return h("div", { key: zoneId, style: { display: "grid", gridTemplateColumns: "1.5fr 180px 80px", gap: "10px", alignItems: "center", padding: "10px 12px", borderTop: "1px solid #E6E6EB" } },
        h("div", { style: { font: "700 12px Nunito", color: "#2A2A2E" } }, zoneLabel(zoneId)),
        h("input", { type: "number", min: "0", max: "100", style: Object.assign({}, inp, { padding: "7px 9px" }), value: z.discountCapPct, onChange: e => updateZone(zoneId, "discountCapPct", e.target.value) }),
        h("label", { style: { display: "flex", justifyContent: "center", alignItems: "center", gap: "6px", font: "600 11px Nunito", color: "#6B6B73" } },
          h("input", { type: "checkbox", checked: z.active === true, onChange: e => updateZone(zoneId, "active", e.target.checked) }), "Activo"));
    };

    return h("div", { style: { marginBottom: "12px", border: "1px solid #E6E6EB", borderRadius: "10px", padding: "14px" } },
      h("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center", gap: "10px", marginBottom: "10px" } },
        h("div", null,
          h("label", { style: lbl }, "Tope de descuento por zona"),
          h("div", { style: { font: "500 10.8px/1.35 Nunito", color: "#6B6B73" } }, "Si configuras zonas, estos topes reemplazan el tope general del producto.")),
        h("button", { onClick: enableZones, style: { padding: "7px 11px", borderRadius: "7px", border: "1px solid #1b8f51", background: "#EAF7F0", color: "#146b3d", font: "800 12px Nunito" } }, "⚙ Configurar topes por zona")),
      h("label", { style: { display: "flex", alignItems: "center", gap: "8px", font: "700 12px Nunito", color: "#2A2A2E", marginBottom: "10px" } },
        h("input", { type: "checkbox", checked: policy.sameCapForAllZones, onChange: e => updateSame(e.target.checked) }),
        "Usar el mismo tope para todas las zonas"),
      h("div", { style: { border: "1px solid #E6E6EB", borderRadius: "9px", overflow: "hidden", marginBottom: "10px" } },
        h("div", { style: { display: "grid", gridTemplateColumns: "1.5fr 180px 80px", gap: "10px", alignItems: "center", padding: "9px 12px", background: "#F7F7F9", font: "800 10px Nunito", color: "#6B6B73", textTransform: "uppercase", letterSpacing: ".06em" } },
          h("div", null, "Zona"), h("div", null, "Tope descuento %"), h("div", { style: { textAlign: "center" } }, "Activo")),
        zoneIds.map(row)),
      h("div", { style: { padding: "8px 10px", borderRadius: "8px", background: "#EEF4FF", border: "1px solid #C4D6F6", color: "#1B4F9E", font: "600 11px/1.4 Nunito" } },
        "ⓘ Si existen zonas configuradas, este tope por zona reemplaza el tope general del producto."));
  }

'''
          if marker not in text:
              raise SystemExit('No se encontró renderProductAdmin marker')
          text = text.replace(marker, method + marker, 1)

          # 8) Reemplazar sección de estados del admin por editor de descuentos por zona.
          old = '''        h("div", { style: { marginBottom: "12px" } },
          h("label", { style: lbl }, "Aplica en estado (vacío = todos los estados)"),
          h("div", { style: { border: "1px solid #D0D0D8", borderRadius: "8px", padding: "8px 10px", maxHeight: "128px", overflow: "auto", display: "grid", gridTemplateColumns: "1fr 1fr", gap: "3px 12px" } },
            C.states.map(stName => h("label", { key: stName, style: { display: "flex", gap: "6px", alignItems: "center", font: "500 11.5px Nunito", color: "#2A2A2E" } },
              h("input", { type: "checkbox", checked: pc.states.indexOf(stName) >= 0, onChange: () => { const cur = pc.states.slice(); const i = cur.indexOf(stName); if (i >= 0) cur.splice(i, 1); else cur.push(stName); patch(id, "states", cur); } }), stName)))),'''
          new = '''        this.renderDiscountPolicyEditor(id, pc, patch, inp, lbl),'''
          text = replace_once(text, old, new, 'admin estados -> discount policy')

          # 9) Nuevo producto: inicializar discountPolicy.
          old = '''      o[id] = { custom: true, name: "Nuevo producto", theme: "green", icon: "star", tagline: "", valueLabel: "Cantidad", maxDiscount: 100, basePrice: "", benefits: ["Nueva característica"], states: [] };'''
          new = '''      o[id] = { custom: true, name: "Nuevo producto", theme: "green", icon: "star", tagline: "", valueLabel: "Cantidad", maxDiscount: 100, discountPolicy: this.defaultDiscountPolicy(100), basePrice: "", benefits: ["Nueva característica"], states: [] };'''
          text = replace_once(text, old, new, 'nuevo producto discountPolicy')

          # 10) Lista de productos: reemplazar texto de estados por resumen de topes.
          old = '''             h("div", { style: { font: "600 10.5px Nunito", color: pc.disabled ? "#A5A5AD" : "#146b3d" } }, (pc.disabled ? "Oculto" : "Vigente") + (pc.custom ? " · personalizado" : "") + (pc.states.length ? (" · " + pc.states.length + " estado(s)") : " · todos los estados")))),'''
          new = '''             h("div", { style: { font: "600 10.5px Nunito", color: pc.disabled ? "#A5A5AD" : "#146b3d" } }, (pc.disabled ? "Oculto" : "Vigente") + (pc.custom ? " · personalizado" : "") + (this.hasZoneDiscountPolicy(pc.discountPolicy) ? " · topes por zona" : (" · tope general " + pc.maxDiscount + "%"))))),'''
          text = replace_once(text, old, new, 'lista productos resumen')

          path.write_text(text, encoding='utf-8')
          PY

      - name: Remove one-time workflow
        run: rm -f .github/workflows/patch-product-admin-discount-policy.yml

      - name: Commit patched files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Calculadora.dc.html .github/workflows/patch-product-admin-discount-policy.yml
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Ajusta admin de productos para topes por zona"
            git push
          fi
