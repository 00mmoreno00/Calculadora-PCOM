<x-dc>
<helmet>
  <link rel="stylesheet" href="_ds/series-zero-pitch-deck-design-system-499262af-6b79-441c-b6db-63875a10b92e/colors_and_type.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <script src="utils.js"></script>
  <script src="config.js"></script>
  <script src="pricing-data.js"></script>
  <script src="promotions.js"></script>
  <script src="pricing-engine.js"></script>
  <script src="promotion-engine.js"></script>

  <style>
    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{font-family:'Nunito',system-ui,sans-serif;color:#111;background:#EDEDF1;-webkit-font-smoothing:antialiased}

      .pc-proposal-pane{height:auto !important;padding:20px 14px !important;overflow-x:hidden}
    }

      .pc-panel{padding:0 12px 32px !important}

    }

</helmet>
<div style="min-height:100vh">{{ app }}</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  // ===================== ESTADO INICIAL =====================
  state = {
    ready: false,
    admin: false,
    showAdmin: false,
    exporting: false,
    exportError: "",
    showBreakdown: false,

    // Asesor + cliente
    advisorId: "",
    clientName: "",
    clientInventory: "",
    clientStatus: "Prospecto",
    stateName: "",
    zone: "",
    zoneManual: false,

    // Propuesta
    mode: "individual",
    proposalDate: "",
    proposalValidUntil: "",
    folio: "",
    advisorSearch: "",
    proposalNotes: "",

    // Productos
    products: [],

    // Admin editor
    promoDraft: null,
    importText: "",

    // Administración de productos (protegida por contraseña)
    showPwd: false,
    pwdInput: "",
    pwdError: "",
    showProductAdmin: false,
    adminEditingId: null,
    adminTab: "productos",

    // Feedback efímero (toast) para acciones de borrador/copiar/limpiar
    toast: "",

    // Editor CSV de precios (borrador en memoria mientras se edita)
    csvDraft: null
  };

  PWD = "12345";
  PRODUCT_IDS = ["elite", "oportunidades", "destacados", "prime"];
  DRAFT_FIELDS = ["advisorId", "clientName", "clientInventory", "clientStatus", "stateName", "zone", "zoneManual", "mode", "proposalDate", "proposalValidUntil", "folio", "proposalNotes", "products"];

  // Catálogo de asesores: SIEMPRE desde config.js. Sin persistencia en navegador.
  getAdvisors() {
    return (window.PC.config.advisors || []).map(a => Object.assign({}, a));
  }
  saveAdvisors() { /* Sin persistencia: los asesores viven en config.js. */ }

  // Paleta por producto (verde / dorado / azul) para la propuesta y PDF.
  themes = {
    green: { main: "#16763F", accent: "#1E9D5B", soft: "#E4F5EC", border: "#C3E7D2", chip: "#1E9D5B" },
    gold:  { main: "#8A6410", accent: "#C58A1A", soft: "#FAF2DC", border: "#EAD8A6", chip: "#C58A1A" },
    blue:  { main: "#1B4F9E", accent: "#2A6FDB", soft: "#E7F0FC", border: "#C4DAF6", chip: "#2A6FDB" }
  };

  // ===================== CICLO DE VIDA =====================
  componentDidMount() {
    this._poll = setInterval(() => {
      if (window.PC && window.PC.PricingEngine && window.PC.Validators) {
        clearInterval(this._poll);
        this.init();
      }
    }, 60);
    this._onResize = () => this.fitProposal();
    window.addEventListener("resize", this._onResize);
  }
  componentDidUpdate() { this.fitProposal(); }
  componentWillUnmount() {
    if (this._poll) clearInterval(this._poll);
    if (this._onResize) window.removeEventListener("resize", this._onResize);
    if (this._fitRAF) cancelAnimationFrame(this._fitRAF);
  }

  // Escala el documento de propuesta (fijo a 820px) para que quepa en cualquier pantalla,
  // conservando su maquetación exacta. En pantallas anchas se muestra a tamaño real y centrado.
  fitProposal() {
    if (this._fitRAF) cancelAnimationFrame(this._fitRAF);
    this._fitRAF = requestAnimationFrame(() => {
      const pane = this.proposalPaneRef, outer = this.scaleOuterRef, inner = this.scaleInnerRef;
      const doc = document.getElementById("pc-proposal");
      if (!pane || !outer || !inner || !doc) return;
      const cs = getComputedStyle(pane);
      const avail = pane.clientWidth - parseFloat(cs.paddingLeft || 0) - parseFloat(cs.paddingRight || 0);
      const s = Math.min(1, avail / 820);
      inner.style.transform = s < 1 ? "scale(" + s + ")" : "none";
      outer.style.width = (820 * s) + "px";
      outer.style.height = s < 1 ? (doc.offsetHeight * s) + "px" : "auto";
    });
  }

  init() {
    const U = window.PC.utils, C = window.PC.config;
    const today = U.todayLocal();
    const validUntil = U.addBusinessDays(today, C.proposalValidityBusinessDays);
    const isAdmin = new URLSearchParams(location.search).get("admin") === "true";
    this.setState({
      ready: true,
      admin: isAdmin,
      proposalDate: U.toISO(today),
      proposalValidUntil: U.toISO(validUntil),
      folio: this.makeFolio(today),
      advisorId: this.getAdvisors()[0] ? this.getAdvisors()[0].id : "",
      products: [this.makeProduct()]
    });
    this.loadPriceCatalog();
  }

  // Carga la fuente OFICIAL de precios: data/precios/index.json + sus CSV.
  // Si algo falla, deja el catálogo vacío y la calculadora usa el fallback actual.
  loadPriceCatalog() {
    fetch("data/precios/index.json")
      .then(r => r.ok ? r.json() : null)
      .then(idx => {
        if (!idx || !Array.isArray(idx.files)) return null;
        return Promise.all(idx.files.map(f =>
          fetch(f.file).then(r => r.ok ? r.text() : "").then(txt => {
            const res = this.validateCSV(txt);
            return res.errors.length ? [] : res.rows;
          }).catch(() => [])
        ));
      })
      .then(all => { if (all) { this._priceCatalogRows = [].concat.apply([], all); this.forceUpdate(); } })
      .catch(() => { });
  }

  makeFolio(d) {
    const U = window.PC.utils;
    const r = Math.floor(1000 + Math.random() * 9000);
    return "P-" + d.getFullYear() + U.pad(d.getMonth() + 1) + U.pad(d.getDate()) + "-" + r;
  }

  makeProduct(productId) {
    const U = window.PC.utils;
    return {
      uid: "p" + Math.random().toString(36).slice(2, 8),
      productId: productId || "elite",
      period: "anual",
      startDate: this.state.proposalDate || U.toISO(U.todayLocal()),
      eliteOption: "hasta300",
      oppOption: "10",
      inventory: "",
      quantity: 1,
      primeCalcMode: "tabla",
      manualDiscountPct: 0,
      // Promo manual por producto (bonificación / cortesía)
      promoOn: false,
      promoQty: 1,
      promoProduct: "destacados"
    };
  }

  // ===================== MUTADORES DE ESTADO =====================
  set(key, val) { this.setState({ [key]: val, exportError: "" }); }

  // ===================== FEEDBACK / NAVEGACIÓN =====================
  flash(msg) {
    this.setState({ toast: msg });
    clearTimeout(this._toastT);
    this._toastT = setTimeout(() => this.setState({ toast: "" }), 2200);
  }
  // Salta a una sección del panel sin usar scrollIntoView (respeta el layout).
  jumpTo(id) {
    try {
      const el = document.getElementById(id); if (!el) return;
      const p = this.panelRef;
      if (p && p.scrollHeight > p.clientHeight + 4) {
        const er = el.getBoundingClientRect(), pr = p.getBoundingClientRect();
        p.scrollTop += (er.top - pr.top) - 14;
      } else {
        const y = el.getBoundingClientRect().top + window.pageYOffset - 14;
        window.scrollTo({ top: y, behavior: "smooth" });
      }
    } catch (e) { }
  }

  // Completitud por sección (solo lectura del estado; no cambia el cálculo).
  secStatus(d) {
    const s = this.state, v = d.validation, items = d.items || [];
    const cc = items.filter(i => i.validation.complete).length;
    return {
      asesor: !!s.advisorId,
      cliente: !!(s.clientName && s.clientName.trim()),
      zona: !!s.zone && !!s.stateName,
      productos: s.mode === "individual" ? cc >= 1 : cc >= 2,
      vigencia: !!s.proposalValidUntil && !!s.proposalDate,
      listo: !!v.canExport
    };
  }
  // Mapea un texto de "faltante" a la sección donde se corrige.
  missToSec(m) {
    m = String(m).toLowerCase();
    if (m.indexOf("asesor") >= 0) return "sec-01";
    if (m.indexOf("cliente") >= 0) return "sec-02";
    if (m.indexOf("zona") >= 0 || m.indexOf("estado") >= 0) return "sec-03";
    if (m.indexOf("producto") >= 0 || m.indexOf("paquete") >= 0 || m.indexOf("comparativo") >= 0 || m.indexOf("cantidad") >= 0 || m.indexOf("inventario") >= 0 || m.indexOf("periodo") >= 0) return "sec-05";
    if (m.indexOf("vigencia") >= 0 || m.indexOf("fecha") >= 0) return "sec-06";
    return null;
  }
  firstIncompleteSec() {
    const st = this._secStatus || {};
    const order = [["asesor", "sec-01"], ["cliente", "sec-02"], ["zona", "sec-03"], ["productos", "sec-05"], ["vigencia", "sec-06"]];
    for (let i = 0; i < order.length; i++) { if (!st[order[i][0]]) return order[i][1]; }
    return null;
  }

  // ===================== BORRADOR / COPIAR / LIMPIAR =====================
  // Borradores desactivados: la app no guarda datos en el navegador.
  saveDraft() { }
  hasDraft() { return false; }
  loadDraft() { }
  clearAll() {
    const U = window.PC.utils, C = window.PC.config;
    const today = U.todayLocal();
    const advs = this.getAdvisors();
    this.setState({
      advisorId: advs[0] ? advs[0].id : "",
      clientName: "", clientInventory: "", clientStatus: "Prospecto",
      stateName: "", zone: "", zoneManual: false,
      mode: "individual", advisorSearch: "", proposalNotes: "",
      proposalDate: U.toISO(today),
      proposalValidUntil: U.toISO(U.addBusinessDays(today, C.proposalValidityBusinessDays)),
      folio: this.makeFolio(today),
      products: [this.makeProduct()],
      exportError: "", showBreakdown: false
    });
    this.flash("Formulario limpio");
  }
  copySummary(data) {
    const U = window.PC.utils, C = window.PC.config, s = this.state;
    const adv = this.getAdvisors().find(a => a.id === s.advisorId);
    const modeTitle = { individual: "Propuesta comercial", paquete: "Propuesta de paquete", vs: "Comparativo de productos" }[s.mode] || "Propuesta";
    const L = [];
    L.push(C.company.name + " — " + modeTitle);
    L.push("Cliente: " + (s.clientName || "—") + "  ·  Estado: " + (s.stateName || "—"));
    L.push("Asesor: " + (adv ? adv.name : "—") + "  ·  Folio: " + s.folio);
    L.push("Vigencia: " + U.formatLong(U.fromISO(s.proposalValidUntil)));
    L.push("");
    data.items.forEach((it, i) => {
      const r = it.result;
      L.push((i + 1) + ". " + r.productName + " (" + r.periodLabel + ")" +
        (r.visibleDiscountPct > 0 ? "  −" + r.visibleDiscountPct + "%" : "") +
        "  →  " + U.money(r.finalPriceIVA) + " con IVA");
    });
    L.push("");
    if (s.mode === "paquete" && data.pkg) L.push("TOTAL paquete con IVA: " + U.money(data.pkg.calc.totalIVA));
    else if (s.mode === "individual") L.push("TOTAL con IVA: " + U.money(data.items[0].result.finalPriceIVA));
    const txt = L.join("\n");
    try {
      if (navigator.clipboard && navigator.clipboard.writeText) { navigator.clipboard.writeText(txt); this.flash("Resumen copiado al portapapeles"); }
      else { const ta = document.createElement("textarea"); ta.value = txt; document.body.appendChild(ta); ta.select(); document.execCommand("copy"); document.body.removeChild(ta); this.flash("Resumen copiado"); }
    } catch (e) { this.flash("No se pudo copiar"); }
  }



  onStateName(v) {
    const C = window.PC.config;
    const patch = { stateName: v, exportError: "" };
    if (!this.state.zoneManual) patch.zone = C.suggestZone(v); // auto-sugerir zona
    this.setState(patch);
  }
  onZone(v) { this.setState({ zone: v, zoneManual: true, exportError: "" }); }
  resyncZone() {
    const C = window.PC.config;
    this.setState({ zone: C.suggestZone(this.state.stateName), zoneManual: false, exportError: "" });
  }

  onMode(mode) {
    let products = this.state.products.slice();
    if (mode === "individual") products = [products[0] || this.makeProduct()];
    else if (mode === "vs") {
      products = [products[0] || this.makeProduct("elite"), products[1] || this.makeProduct("prime")];
    } else if (mode === "paquete") {
      if (products.length < 2) {
        products = [products[0] || this.makeProduct("oportunidades"), this.makeProduct("destacados")];
      }
    }
    this.setState({ mode, products, exportError: "" });
  }

  updateProduct(idx, patch) {
    const products = this.state.products.map((p, i) => i === idx ? Object.assign({}, p, patch) : p);
    this.setState({ products, exportError: "" });
  }
  addProduct() {
    if (this.state.products.length >= 4) return;
    const used = this.state.products.map(p => p.productId);
    const cat = this.activeCatalog();
    const next = cat.find(x => used.indexOf(x) < 0) || cat[0] || "elite";
    this.setState({ products: this.state.products.concat([this.makeProduct(next)]), exportError: "" });
  }
  removeProduct(idx) {
    if (this.state.products.length <= 1) return;
    this.setState({ products: this.state.products.filter((_, i) => i !== idx), exportError: "" });
  }

  // ===================== CÁLCULO (usa los motores) =====================
  computeAll() {
    const PE = window.PC.PricingEngine, PR = window.PC.PromotionEngine, V = window.PC.Validators;
    const date = window.PC.utils.fromISO(this.state.proposalDate) || window.PC.utils.todayLocal();
    const s = this.state;
    const productIds = s.products.map(p => p.productId);

    const items = s.products.map(p => {
      const pc = this.pcfg(p.productId);
      // Etiqueta de "Oferta" para buscar en el CSV (según selección del producto).
      let offerLabel = "";
      if (p.productId === "elite") { const o = pc.coverage.find(c => c.value === p.eliteOption); offerLabel = o ? o.label : ""; }
      else if (p.productId === "oportunidades") { const o = pc.coverage.find(c => c.value === p.oppOption); offerLabel = o ? o.label : ""; }
      else { offerLabel = String(p.quantity || "").trim(); }

      // Fuente principal: precio del CSV (total del periodo). Si no hay, fallback a la lógica actual.
      const csvInfo = this.csvPeriodInfo(p.productId, offerLabel, p.period, s.zone, s.stateName);
      const csvTotal = csvInfo ? csvInfo.final : null;
      let baseOverride = pc.basePrice;
      if (csvTotal != null && csvTotal > 0) {
        const mm = window.PC.PricingEngine.months(p.period) || 1;
        if (p.productId === "elite" || p.productId === "oportunidades") baseOverride = csvTotal / mm;
        else { const qq = Math.max(1, Number(p.quantity) || 1); baseOverride = csvTotal / (qq * mm); }
      } else if (p.productId === "elite" || p.productId === "oportunidades") {
        const sel = p.productId === "elite" ? p.eliteOption : p.oppOption;
        const o = pc.coverage.find(c => c.value === sel);
        if (o && o.price != null && o.price !== "") baseOverride = Number(o.price);
      }
      const cfg = {
        productId: p.productId, mode: s.mode, zone: s.zone || "CDMX_EDOMEX",
        period: p.period, eliteOption: p.eliteOption, oppOption: p.oppOption,
        inventory: s.clientInventory, quantity: p.quantity, primeCalcMode: p.primeCalcMode,
        manualDiscountPct: p.manualDiscountPct,
        promoOn: p.promoOn, promoQty: p.promoQty, promoProduct: p.promoProduct,
        basePriceOverride: baseOverride, maxDiscount: pc.maxDiscount
      };
      const promoCtx = {
        mode: s.mode, productId: p.productId, products: productIds,
        zone: cfg.zone, period: p.period, inventory: p.inventory, quantity: p.quantity, date
      };
      const promoEval = PR.evaluateForProduct(promoCtx);
      // La promoción solo se aplica si el comercial activó "Promo".
      // Sin promo activa y sin descuento manual, no debe aparecer descuento alguno.
      const result = PE.computePrice(cfg, p.promoOn ? promoEval.applied : null);
      result.productName = pc.name; // nombre configurable (admin)
      result.theme = pc.theme;      // tema configurable (admin)
      // Descuento de ZONA proveniente del CSV (precio de lista vs precio final).
      if (csvInfo && csvInfo.base != null && csvInfo.discountPct > 0 && csvInfo.base > result.finalPrice) {
        result.zoneListPrice = Math.round(csvInfo.base);
        result.zoneDiscountPct = csvInfo.discountPct;
      }
      const validation = V.validateProduct(Object.assign({}, cfg, { startDate: p.startDate }), result);
      // Restricción por estado(s) (admin): el producto solo aplica en los estados listados.
      if (pc.states.length && pc.states.indexOf(s.stateName) < 0) {
        validation.complete = false;
        validation.missing.push(pc.name + " solo aplica en: " + pc.states.join(", ") + " (estado actual: " + (s.stateName || "sin estado") + ")");
      }
      // Vigencia por producto (incluye meses de cortesía por promo).
      const start = window.PC.utils.fromISO(p.startDate);
      const extra = result.appliedPromotion ? (result.appliedPromotion.extraMonths || 0) : 0;
      const end = start ? window.PC.utils.addMonths(start, result.months + extra) : null;
      return { cfg, result, promoEval, validation, start, end, extraMonths: extra };
    });

    // Promo a nivel paquete
    let pkg = null;
    if (s.mode === "paquete") {
      const pkgEval = PR.evaluateForPackage({ mode: s.mode, products: productIds, zone: s.zone, period: s.products[0] && s.products[0].period, date });
      pkg = { eval: pkgEval, calc: PE.computePackage(items.map(i => i.result), pkgEval.applied) };
    }

    const validation = V.validateProposal(s, items.map(i => i.validation));
    this._lastValidation = validation;
    this._secStatus = this.secStatus({ items, validation });
    return { items, pkg, validation };
  }

  // ===================== EXPORTAR PDF =====================
  async exportPDF() {
    if (!this._lastValidation || !this._lastValidation.canExport) {
      this.setState({ exportError: "La propuesta no está completa. Revisa la lista de pendientes." });
      return;
    }
    this.setState({ exporting: true, exportError: "" });
    try {
      const built = await this.buildPdf();
      built.pdf.save(built.filename);
    } catch (e) {
      this.setState({ exportError: "Error al exportar el PDF: " + (e && e.message ? e.message : e) });
    }
    this.setState({ exporting: false });
  }

  // Genera el PDF y devuelve { pdf, blob, filename }. Reutilizado por exportar y enviar.
  async buildPdf() {
    const node = document.getElementById("pc-proposal");
    if (!node || !window.html2canvas || !window.jspdf) throw new Error("Librerías no cargadas.");
    // Neutraliza el escalado responsivo para capturar el documento a tamaño completo (820px).
    const _inner = this.scaleInnerRef, _outer = this.scaleOuterRef;
    const _t = _inner ? _inner.style.transform : "", _h = _outer ? _outer.style.height : "", _w = _outer ? _outer.style.width : "";
    const _restore = () => { if (_inner) _inner.style.transform = _t; if (_outer) { _outer.style.height = _h; _outer.style.width = _w; } this.fitProposal(); };
    if (_inner) _inner.style.transform = "none";
    if (_outer) { _outer.style.height = "auto"; _outer.style.width = "820px"; }
    let canvas;
    try { canvas = await window.html2canvas(node, { scale: 2, backgroundColor: "#ffffff", useCORS: true, windowWidth: node.scrollWidth }); }
    catch (e) { _restore(); throw e; }
    _restore();
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF("p", "pt", "a4");
    const pw = pdf.internal.pageSize.getWidth();
    const ph = pdf.internal.pageSize.getHeight();
    const imgH = canvas.height * pw / canvas.width;
    const img = canvas.toDataURL("image/jpeg", 0.95);
    let position = 0, heightLeft = imgH;
    pdf.addImage(img, "JPEG", 0, position, pw, imgH);
    heightLeft -= ph;
    while (heightLeft > 0) { position -= ph; pdf.addPage(); pdf.addImage(img, "JPEG", 0, position, pw, imgH); heightLeft -= ph; }
    const safe = (this.state.clientName || "Cliente").trim().replace(/[^\wáéíóúñÁÉÍÓÚÑ\- ]+/g, "").replace(/\s+/g, "_") || "Cliente";
    return { pdf: pdf, blob: pdf.output("blob"), filename: "Propuesta_" + safe + ".pdf" };
  }

  // Sin overrides: productos, precios y metadatos vienen de config.js, pricing-data.js y data/precios/*.
  getProductOverrides() { return {}; }
  saveProductOverrides() { /* Sin persistencia en navegador. */ }
  // Configuración efectiva de un producto (default + override). Soporta productos personalizados.
  pcfg(id) {
    const C = window.PC.config;
    const meta = C.productMeta[id];
    const isCustom = !meta;
    const ov = (this.getProductOverrides()[id]) || {};
    const states = Array.isArray(ov.states) ? ov.states : (ov.restrictState ? [ov.restrictState] : []);
    return {
      id: id, custom: isCustom,
      name: ov.name != null && ov.name !== "" ? ov.name : (meta ? meta.name : "Producto"),
      badge: ov.badge != null ? ov.badge : (meta ? meta.badge : "Complemento"),
      tagline: ov.tagline != null ? ov.tagline : (meta ? meta.tagline : ""),

  // Autodetecta el separador de la primera línea: coma, punto y coma o tab.
  csvDelimiter(line) {
    const c = (line.match(/,/g) || []).length;
    const s = (line.match(/;/g) || []).length;
    const t = (line.match(/\t/g) || []).length;

      const c = line[i];
      if (q) { if (c === '"') { if (line[i + 1] === '"') { cur += '"'; i++; } else q = false; } else cur += c; }
      else { if (c === '"') q = true; else if (c === D) { out.push(cur); cur = ""; } else cur += c; }

  validateCSV(text) {

    const ALL = ["Producto", "Oferta", "Zona", "Estados", "Vigencia", "PrecioBase", "Descuento", "PrecioFinal"];
    const REQ = ["Producto", "Oferta", "Vigencia", "PrecioFinal"];
    const errors = [], rows = [];

    const delim = this.csvDelimiter(lines[0]);
    const header = this.csvSplitLine(lines[0], delim);
    const norm = header.map(x => x.toLowerCase());
    const idx = {}; ALL.forEach(c => idx[c] = norm.indexOf(c.toLowerCase()));
    REQ.forEach(c => { if (idx[c] < 0) errors.push({ row: 0, msg: "Falta la columna obligatoria: " + c }); });
    lines.slice(1).forEach((ln, i) => {
      const rowNum = i + 2;
      const cells = this.csvSplitLine(ln, delim);

      const pf = get("PrecioFinal"), pb = get("PrecioBase"), desc = get("Descuento");
      if (idx["Producto"] >= 0 && !producto) errors.push({ row: rowNum, msg: "Producto vacío" });

      if (idx["Vigencia"] >= 0) { if (!vig) errors.push({ row: rowNum, msg: "Vigencia vacía" }); else if (VIG.indexOf(vig.toLowerCase()) < 0) errors.push({ row: rowNum, msg: "Vigencia inválida (\"" + vig + "\"): use Mensual, Trimestral, Semestral o Anual" }); }
      if (pf !== "" && isNaN(Number(pf))) errors.push({ row: rowNum, msg: "PrecioFinal no numérico (\"" + pf + "\")" });
      if (pb !== "" && isNaN(Number(pb))) errors.push({ row: rowNum, msg: "PrecioBase no numérico (\"" + pb + "\")" });
      if (desc !== "" && isNaN(Number(String(desc).replace("%", "").trim()))) errors.push({ row: rowNum, msg: "Descuento no numérico (\"" + desc + "\")" });
      rows.push({ row: rowNum, producto, oferta, zona: get("Zona"), estados: get("Estados"), vigencia: vig, precioBase: pb, descuento: desc, precioFinal: pf });
    });

    const seen = {};

  csvPeriodInfo(productId, offerLabel, period, zoneId, stateName) {
